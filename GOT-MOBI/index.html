<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🐺 ИГРА ПРЕСТОЛОВ: MOBI</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="app">
        <div class="header"><h1>🐺 ИГРА ПРЕСТОЛОВ</h1><h2>MOBI</h2></div>

        <!-- СТРАНИЦА ВХОДА -->
        <div id="page-login">
            <div class="page-title">ВХОД</div>
            <div id="login-error" class="msg-error hide"></div>
            <div class="form-group"><label>Имя персонажа</label><input type="text" id="login-name" placeholder="Введите имя"></div>
            <div class="form-group"><label>Пароль</label><input type="password" id="login-password" placeholder="Введите пароль"></div>
            <button class="btn btn-primary" onclick="handleLogin()">⚔️ ВОЙТИ</button>
            <div class="divider">— ИЛИ —</div>
            <button class="btn btn-secondary" onclick="showPage('register')">📜 СОЗДАТЬ ПЕРСОНАЖА</button>
        </div>

        <!-- СТРАНИЦА РЕГИСТРАЦИИ -->
        <div id="page-register" class="hide">
            <div class="page-title">СОЗДАНИЕ ПЕРСОНАЖА</div>
            <div id="register-error" class="msg-error hide"></div>
            <div id="register-success" class="msg-success hide"></div>
            <div id="register-form">
                <div class="form-group"><label>Имя персонажа</label><input type="text" id="reg-name" placeholder="например: Эддард"><small>Минимум 2 символа</small></div>
                <div class="form-group"><label>Пароль</label><input type="password" id="reg-password" placeholder="Придумайте пароль"><small>Минимум 4 символа</small></div>
                <div class="form-group"><label>Национальность</label>
                    <select id="reg-nationality">
                        <option value="">▼ Выберите</option>
                        <option value="Северные земли">❄️ Северные земли</option>
                        <option value="Речные земли">🌊 Речные земли</option>
                        <option value="Долина">🏔️ Долина</option>
                        <option value="Западные земли">💰 Западные земли</option>
                        <option value="Простор">🌾 Простор</option>
                        <option value="Штормовые земли">⛈️ Штормовые земли</option>
                        <option value="Дорн">☀️ Дорн</option>
                    </select>
                </div>
                <div class="form-group"><label>Секретное слово</label><input type="text" id="reg-secret" placeholder="Для восстановления пароля"></div>
                <button class="btn btn-primary" onclick="handleRegister()">🔥 ЗАРЕГИСТРИРОВАТЬСЯ</button>
                <div class="divider">—</div>
                <button class="btn btn-secondary" onclick="showPage('login')">Уже есть персонаж? Войти →</button>
            </div>
        </div>

        <!-- СТРАНИЦА ИГРЫ -->
        <div id="page-game" class="hide">
            <div id="menu-bar">
                <div class="menu-top">
                    <div class="menu-time">🕐 <span id="menu-time">--:--</span> МСК</div>
                    <div class="menu-location">🏠 <span id="menu-location">Таверна</span></div>
                </div>
                <div class="menu-stats">
                    <div class="menu-hp">❤️ <span id="menu-hp">60</span>/<span id="menu-hp-max">60</span></div>
                    <div class="menu-level">📈 Уровень: <span id="menu-level">1</span></div>
                    <div class="menu-money">🪙 <span id="menu-gold">0</span></div>
                </div>
                <div class="menu-resources">
                    <div class="menu-food">🍖 <span id="menu-food">100</span>/100</div>
                    <div class="menu-thirst">💧 <span id="menu-thirst">100</span>/100</div>
                    <div class="menu-fatigue">😴 <span id="menu-fatigue">100</span>/100</div>
                </div>
                <div class="menu-actions">
                    <button class="menu-btn" onclick="openCharacter()">👤</button>
                    <button class="menu-btn" onclick="openInventory()">🎒</button>
                    <button class="menu-btn" onclick="openMap()">🗺️</button>
                </div>
            </div>
            <div id="busy-status" class="status-busy hide">⏳ Вы заняты...</div>
            <div class="story-box" id="story-box">
                <h4 id="story-title">📍 Таверна</h4>
                <p id="story-text">Добро пожаловать в таверну.</p>
                <div class="action-group">
                    <p>⚡ Что делаете?</p>
                    <div id="actions-container">
                        <button class="btn-game" onclick="window.eat()">🍞 Поесть (+25 еды)</button>
                        <button class="btn-game" onclick="window.rest()">🛏️ Отдохнуть (10 МП)</button>
                        <button class="btn-game" onclick="window.talk()">🗣️ Поговорить</button>
                    </div>
                    <div id="game-message" class="game-msg"></div>
                </div>
            </div>
            <button class="btn btn-danger" onclick="handleLogout()">🚪 Выйти из игры</button>
        </div>
        <div class="footer">❄️ ЗИМА БЛИЗКО</div>
    </div>

    <!-- МОДАЛЬНЫЕ ОКНА -->
    <div id="modal-character" class="modal-overlay hide"><div class="modal-box"><div class="modal-header"><h3>👤 ПЕРСОНАЖ</h3><button class="close-btn">✕</button></div><div id="modal-content"></div></div></div>
    <div id="modal-inventory" class="modal-overlay hide"><div class="modal-box"><div class="modal-header"><h3>🎒 ИНВЕНТАРЬ</h3><button class="close-btn">✕</button></div><div id="modal-inventory-content"></div></div></div>
    <div id="modal-map" class="modal-overlay hide"><div class="modal-box"><div class="modal-header"><h3>🗺️ ПЕРЕМЕЩЕНИЕ</h3><button class="close-btn">✕</button></div><div id="modal-map-content"></div></div></div>

    <!-- ПОДКЛЮЧАЕМ JS -->
    <script src="js/main.js"></script>
</body>
</html>
